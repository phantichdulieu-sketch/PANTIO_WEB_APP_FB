        /* Reset cơ bản */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }

        /* Hình nền toàn màn hình có lớp phủ mờ */
        .background-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('./back_web.webp') no-repeat center center/cover;
            filter: brightness(50%); /* Làm tối ảnh nền để nổi bật chữ */
            z-index: 1;
        }

        /* Nội dung chính */
        .content-wrapper {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        /* Logo / Tên thương hiệu */
        .brand-logo {
            font-family: 'Neo Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 2.5rem;
            font-weight: 500;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 10px;
            animation: fadeIn 1.5s ease-in-out;
        }

        .brand-tagline {
            font-size: 0.9rem;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #ccc;
            margin-bottom: 50px;
            animation: fadeIn 2s ease-in-out;
        }

        /* Khu vực các nút điều hướng */
        .navigation-links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 320px;
            animation: fadeInUp 1.2s ease-out;
        }

        /* Style cho từng nút */
        .nav-btn {
            display: block;
            padding: 16px 20px;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px); /* Hiệu ứng kính mờ thời thượng */
            transition: all 0.4s ease;
            border-radius: 0px; /* Giữ vuông vức cho sang trọng */
        }

        /* Hiệu ứng khi di chuột vào nút */
        .nav-btn:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
            letter-spacing: 4px; /* Chữ giãn nhẹ tạo cảm giác mượt mà */
            cursor: pointer;
        }

        /* Hiệu ứng Footer nhỏ */
        .footer-text {
            position: absolute;
            bottom: 20px;
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Tối ưu hóa cho thiết bị di động */
        @media (max-width: 480px) {
            .brand-logo { font-size: 2rem; letter-spacing: 5px; }
            .brand-tagline { font-size: 0.8rem; margin-bottom: 40px; }
            .nav-btn { padding: 14px 18px; font-size: 0.85rem; }
        }
    </style>
